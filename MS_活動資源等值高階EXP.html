<!DOCTYPE html>
<html lang="zh-Hant">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>MS 活動資源等值高階EXP頁</title>
<style>
:root{--bg:#0f172a;--card:#111827;--muted:#94a3b8;--text:#e5e7eb;--line:#243041;--accent:#38bdf8}
*{box-sizing:border-box}
body{margin:0;background:linear-gradient(180deg,#0b1220,#0f172a);color:var(--text);font-family:ui-sans-serif,system-ui,-apple-system,Segoe UI,Roboto,Arial,"Noto Sans TC",sans-serif}
.wrap{max-width:1500px;margin:0 auto;padding:24px}
h1{margin:0 0 8px;font-size:28px}h2{font-size:18px;margin:0 0 12px}h3{font-size:13px;margin:10px 0 6px;color:#94a3b8}
.sub{color:var(--muted);line-height:1.6;margin-bottom:18px}
.nav{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:16px}.nav a{color:#bae6fd;text-decoration:none;background:#082f49;padding:8px 12px;border-radius:999px;border:1px solid #164e63}
.grid{display:grid;grid-template-columns:1.2fr .95fr;gap:16px;align-items:start}
.stack{display:grid;gap:14px}
.card{background:rgba(17,24,39,.96);border:1px solid var(--line);border-radius:16px;padding:16px;box-shadow:0 10px 35px rgba(0,0,0,.22)}
label{display:block;font-size:13px;color:#cbd5e1;margin-bottom:6px}input,select{width:100%;padding:10px 12px;border-radius:10px;border:1px solid #334155;background:#0b1220;color:var(--text)}
.row{display:grid;grid-template-columns:1fr 1fr;gap:10px}.row3{display:grid;grid-template-columns:repeat(3,1fr);gap:10px}
.muted{color:var(--muted);font-size:12px;line-height:1.5}.section-gap{margin-top:12px;padding-top:12px;border-top:1px dashed #334155}

<div class="wrap">
<div class="nav"><a href="./index.html">主計算頁</a><a href="./MS_狩獵經驗％計算.html">狩獵經驗%</a><a href="./MS_狩獵效率.html">狩獵效率</a><a href="./MS_活動資源等值高階EXP.html">活動資源</a><a href="./MS_VIP掛機推估.html">VIP掛機</a></div>
<h1>MS 活動資源等值高階EXP頁</h1>
<div class="sub">整合活動資源與消耗內容，換算實際EXP與等值高階EXP票經驗。</div>
<div class="grid">
  <div class="stack">
    <div class="card">
      <h2>基本設定</h2>
      <div class="row">
        <div><label>目前等級</label><select id="level"></select></div>
        <div><label>目前經驗 %</label><input id="pct" type="number" min="0" max="99.999999" step="0.0001" value="0"></div>
      </div>
    </div>

    <div class="card">
      <h2>活動資源</h2>
      <div class="row3">
        <div><label>一般加速器數量</label><input id="normalCount" type="number" min="0" step="1" value="0"></div>
        <div><label>EXPRESS 數量</label><input id="expressCount" type="number" min="0" step="1" value="0"></div>
        <div><label>鋼鐵草莓農場次數</label><input id="steelCount" type="number" min="0" step="1" value="0"></div>
      </div>
      <div class="row3 section-gap">
        <div><label>黃金番茄次數</label><input id="tomatoRuns" type="number" min="0" step="1" value="0"></div>
        <div><label>黃金番茄分數</label><input id="tomatoAvg" type="number" min="0" max="1150" step="1" value="0"></div>
        <div><label>桑拿時數</label><input id="saunaHours" type="number" min="0" step="0.5" value="0"></div>
      </div>
      <div class="row3 section-gap">
        <div><label>高階EXP票數</label><input id="highTickets" type="number" min="0" step="0.01" value="0"></div>
        <div><label>永恆發條數量</label><input id="eternalCount" type="number" min="0" step="1" value="0"></div>
        <div><label>狩獵經驗倍率 %（永恆發條）</label><input id="eternalHuntRate" type="number" min="0" step="0.01" value="700"></div>
      </div>
      <div class="row section-gap">
        <div class="muted" id="eternalInfo"></div>
        <div></div>
      </div>
    </div>
  </div>

  <div class="stack">
    <div class="card">
      <h2>結算內容</h2>
      <div class="kpis">
        <div class="kpi"><div class="t">目前等級 1高階EXP經驗</div><div class="v" id="baseHigh">0</div></div>
        <div class="kpi"><div class="t">總 EXP</div><div class="v" id="totalExp">0</div></div>
        <div class="kpi"><div class="t">等值高階EXP</div><div class="v" id="eqHigh">0</div></div>
        <div class="kpi"><div class="t">使用後等級</div><div class="v" id="finalLevel">LV260</div></div>
        <div class="kpi"><div class="t">使用後經驗 %</div><div class="v" id="finalPct">0%</div></div>
        <div class="kpi"><div class="t">番茄每800分 / 鋼草單場</div><div class="v" id="misc">0</div></div>
      </div>
    </div>

    <div class="card">
      <h2>來源拆解</h2>
      <table id="breakdown">
        <thead><tr><th>來源</th><th>EXP</th><th>等值高階EXP</th></tr></thead>
        <tbody></tbody>
      </table>
    </div>
  </div>
</div>
</div>

base600Ticket": 64.50243069753556}, "294": {"monsterExp": 5023491, "highExp": 1078497000, "levelReq": 430892639851879, "base600Ticket": 65.21007847031564}};const EXPRESS={"260": {"expressValue": 62944817280.0, "steelValue": 0.0}, "261": {"expressValue": 63850579200.0, "steelValue": 0.0}, "262": {"expressValue": 64757800320.0, "steelValue": 0.0}, "263": {"expressValue": 65671405440.0, "steelValue": 0.0}, "264": {"expressValue": 66700360320.0, "steelValue": 0.0}, "265": {"expressValue": 86294173210.0, "steelValue": 0.0}, "266": {"expressValue": 87479107450.0, "steelValue": 0.0}, "267": {"expressValue": 88668572620.0, "steelValue": 0.0}, "268": {"expressValue": 90012043430.0, "steelValue": 0.0}, "269": {"expressValue": 91215142810.0, "steelValue": 0.0}, "270": {"expressValue": 124882122700.0, "steelValue": 0.0}, "271": {"expressValue": 126726843340.0, "steelValue": 0.0}, "272": {"expressValue": 128376315610.0, "steelValue": 0.0}, "273": {"expressValue": 130036921690.0, "steelValue": 0.0}, "274": {"expressValue": 131914175270.0, "steelValue": 0.0}, "275": {"expressValue": 148263241690.0, "steelValue": 0.0}, "276": {"expressValue": 150132068390.0, "steelValue": 0.0}, "277": {"expressValue": 152246142720.0, "steelValue": 0.0}, "278": {"expressValue": 154134683060.0, "steelValue": 0.0}, "279": {"expressValue": 156265815590.0, "steelValue": 0.0}, "280": {"expressValue": 156682831200.0, "steelValue": 3265600060800.0}, "281": {"expressValue": 158820878400.0, "steelValue": 3310161465600.0}, "282": {"expressValue": 160729420800.0, "steelValue": 3349939507200.0}, "283": {"expressValue": 162883656000.0, "steelValue": 3394838304000.0}, "284": {"expressValue": 164811076800.0, "steelValue": 3435009811200.0}, "285": {"expressValue": 185271204000.0, "steelValue": 5148589248000.0}, "286": {"expressValue": 187429862400.0, "steelValue": 5208577228800.0}, "287": {"expressValue": 189867045600.0, "steelValue": 5276305267200.0}, "288": {"expressValue": 192319185600.0, "steelValue": 534444894 function fmt(n,d=0){if(!isFinite(n)) return '-';return Number(n).toLocaleString('zh-TW',{maximumFractionDigits:d,minimumFractionDigits:d})}
function num(v){const n=Number(v);return isFinite(n)?n:0}
function q(id){return document.getElementById(id)}
function addRow(rows,name,exp,high){if(exp>0) rows.push({name,exp,high:high>0?exp/high:0})}
function progressAfter(level,pct,extraExp){if(level>=295) return {level:295,pct:0};let curLevel=level;let pool=GENERAL[curLevel].levelReq*pct/100+extraExp;while(curLevel<=294){const req=GENERAL[curLevel].levelReq;if(pool<req) break;pool-=req;curLevel+=1;if(curLevel>=295) return {level:295,pct:0};}const nextReq=GENERAL[curLevel].levelReq;return {level:curLevel,pct:(pool/nextReq)*100}}
function initLevels(){for(let lv=260;lv<=295;lv++){const op=document.createElement('option');op.value=lv;op.textContent=lv===295?'295（已達成）':String(lv);q('level').appendChild(op)}q('level').value=260}
function calc(){
  const lv=num(q('level').value), pct=Math.max(0, Math.min(99.999999, num(q('pct').value)));
  const high=GENERAL[lv].highExp, monster=GENERAL[lv].monsterExp;
  const rows=[];
  addRow(rows,'一般加速器', (GENERAL[lv].base600Ticket||0)*high*num(q('normalCount').value), high);
  addRow(rows,'EXPRESS', (EXPRESS[lv]?EXPRESS[lv].expressValue:0)*num(q('expressCount').value), high);
  addRow(rows,'鋼鐵草莓農場', lv>=280?(EXPRESS[lv]?EXPRESS[lv].steelValue:0)*num(q('steelCount').value):0, high);
  addRow(rows,'黃金番茄拳擊機', (TOMATO[lv]||0)*num(q('tomatoRuns').value)*num(q('tomatoAvg').value), high);
  addRow(rows,'桑拿', num(q('saunaHours').value)*405*high, high);
  addRow(rows,'高階EXP票', num(q('highTickets').value)*high, high);
  const eternalSingle = monster * 2000 * ((num(q('eternalHuntRate').value)+200)/100) * 20;
  addRow(rows,'永恆發條', eternalSingle * num(q('eternalCount').value), high);
  const total=rows.reduce((a,b)=>a+b.exp,0);
  const out=progressAfter(lv,pct,total);
  q('baseHigh').textContent=fmt(high,0);
  q('totalExp').textContent=fmt(total,0);
  q('eqHigh').textContent=fmt(total/high,2);
  q('finalLevel').textContent=out.level>=295?'LV295 已達成':'LV'+out.level;
  q('finalPct').textContent=out.level>=295?'0%':fmt(out.pct,4)+'%';
  q('misc').innerHTML='番茄每800分 '+fmt((TOMATO[lv]||0)*800,0)+' EXP<br>鋼草單場 '+fmt(lv>=280?(EXPRESS[lv]?EXPRESS[lv].steelValue:0):0,0)+' EXP';
  
  const tbody=document.querySelector('#breakdown tbody'); tbody.innerHTML='';
  if(rows.length===0){const tr=document.createElement('tr');tr.innerHTML='<td>尚未輸入來源</td><td>0</td><td>0</td>';tbody.appendChild(tr)}
  else{rows.sort((a,b)=>b.exp-a.exp); for(const r of rows){const tr=document.createElement('tr'); tr.innerHTML='<td>'+r.name+'</td><td>'+fmt(r.exp,0)+'</td><td>'+fmt(r.high,2)+'</td>'; tbody.appendChild(tr);}}
}
initLevels();['level','pct','normalCount','expressCount','steelCount','tomatoRuns','tomatoAvg','saunaHours','highTickets','eternalCount','eternalHuntRate'].forEach(id=>q(id).addEventListener('input',calc));calc();
